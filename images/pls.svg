<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" width="320" height="213">
  <rect x="0" y="0" width="240" height="160" fill="#eef2f5"/>
  <rect x="0" y="118" width="240" height="42" fill="#cdd5db"/>
  <!-- personne en position latérale de sécurité (sur le côté) -->
  <!-- jambe repliée -->
  <path d="M150 116 q26 4 30 -16 q2 -14 -10 -16" fill="none" stroke="#2c3e50" stroke-width="12" stroke-linecap="round"/>
  <!-- tronc -->
  <path d="M70 112 q40 -6 80 4" fill="none" stroke="#2c7be5" stroke-width="22" stroke-linecap="round"/>
  <!-- bras -->
  <path d="M96 104 q10 -22 30 -20" fill="none" stroke="#2c3e50" stroke-width="10" stroke-linecap="round"/>
  <!-- tête tournée + main sous la joue -->
  <circle cx="64" cy="104" r="15" fill="#f4c7a0"/>
  <path d="M76 96 q12 -2 18 6" fill="none" stroke="#2c3e50" stroke-width="9" stroke-linecap="round"/>
  <text x="120" y="24" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#16191d" text-anchor="middle">POSITION LATÉRALE DE SÉCURITÉ</text>
  <text x="120" y="40" font-family="Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle">victime inconsciente qui respire</text>
</svg>

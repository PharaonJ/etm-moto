<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" width="320" height="213">
  <rect x="0" y="0" width="240" height="160" fill="#11151a"/>
  <!-- sol -->
  <rect x="0" y="120" width="240" height="40" fill="#2b2f36"/>
  <!-- moto (vue de côté, simplifiée) -->
  <circle cx="24" cy="112" r="9" fill="#444" stroke="#777" stroke-width="1.5"/>
  <circle cx="44" cy="112" r="9" fill="#444" stroke="#777" stroke-width="1.5"/>
  <rect x="26" y="100" width="18" height="7" rx="3" fill="#2c7be5"/>
  <!-- faisceau croisement (court ~30 m) -->
  <polygon points="50,108 130,100 130,120 50,116" fill="#f1c40f" opacity="0.35"/>
  <text x="92" y="96" font-family="Arial,sans-serif" font-size="11" fill="#f1c40f" text-anchor="middle">Croisement ≈ 30 m</text>
  <!-- faisceau route (long ~100 m) -->
  <polygon points="50,104 224,86 224,98 50,110" fill="#f7dc6f" opacity="0.30"/>
  <text x="170" y="80" font-family="Arial,sans-serif" font-size="11" fill="#f7dc6f" text-anchor="middle">Route ≈ 100 m</text>
  <!-- graduations -->
  <line x1="130" y1="118" x2="130" y2="132" stroke="#f1c40f" stroke-width="2"/>
  <line x1="224" y1="100" x2="224" y2="132" stroke="#f7dc6f" stroke-width="2"/>
</svg>

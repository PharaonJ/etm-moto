  <line x1="152" y1="90" x2="240" y2="90" stroke="#fff" stroke-width="2" stroke-dasharray="12 8"/>
  <line x1="120" y1="0" x2="120" y2="58" stroke="#fff" stroke-width="2" stroke-dasharray="12 8"/>
  <line x1="120" y1="122" x2="120" y2="160" stroke="#fff" stroke-width="2" stroke-dasharray="12 8"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" width="320" height="213">
  <rect x="0" y="0" width="240" height="160" fill="#eef2f5"/>
  <!-- route -->
  <rect x="0" y="40" width="240" height="80" fill="#9aa3ab"/>
  <line x1="0" y1="80" x2="240" y2="80" stroke="white" stroke-width="2" stroke-dasharray="14 10"/>
  <!-- zones d'angle mort (hachurées) -->
  <polygon points="150,62 210,30 210,62" fill="#e74c3c" opacity="0.30"/>
  <polygon points="150,98 210,98 210,130" fill="#e74c3c" opacity="0.30"/>
  <!-- voiture blanche -->
  <rect x="96" y="60" width="64" height="40" rx="7" fill="#fff" stroke="#333" stroke-width="2"/>
  <rect x="104" y="66" width="20" height="28" rx="3" fill="#bcd4e6"/>
  <rect x="132" y="66" width="20" height="28" rx="3" fill="#bcd4e6"/>
  <!-- rétroviseurs -->
  <rect x="92" y="64" width="6" height="4" fill="#333"/>
  <rect x="92" y="92" width="6" height="4" fill="#333"/>
  <!-- moto dans l'angle mort arrière droit -->
  <circle cx="186" cy="112" r="7" fill="#222"/>
  <circle cx="204" cy="112" r="7" fill="#222"/>
  <rect x="188" y="102" width="16" height="8" rx="3" fill="#2c7be5"/>
  <text x="120" y="150" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#e74c3c" text-anchor="middle">ZONES D'ANGLE MORT</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" width="320" height="213">
  <rect x="0" y="0" width="240" height="160" fill="#eef2f5"/>
  <rect x="0" y="40" width="240" height="80" fill="#9aa3ab"/>
  <!-- ligne continue centrale -->
  <line x1="0" y1="80" x2="240" y2="80" stroke="white" stroke-width="4"/>
  <!-- véhicule lent -->
  <rect x="70" y="92" width="50" height="22" rx="5" fill="#bdc3c7" stroke="#333" stroke-width="1.5"/>
  <!-- moto qui tente de dépasser en franchissant -->
  <circle cx="95" cy="60" r="6" fill="#222"/>
  <circle cx="111" cy="60" r="6" fill="#222"/>
  <rect x="97" y="51" width="14" height="7" rx="3" fill="#2c7be5"/>
  <path d="M103,92 Q103,72 103,60" fill="none" stroke="#2c7be5" stroke-width="2.5" stroke-dasharray="5 4"/>
  <!-- croix rouge d'interdiction -->
  <line x1="135" y1="48" x2="175" y2="88" stroke="#e74c3c" stroke-width="7"/>
  <line x1="175" y1="48" x2="135" y2="88" stroke="#e74c3c" stroke-width="7"/>
  <text x="120" y="148" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#e74c3c" text-anchor="middle">Ligne continue : dépassement interdit</text>
</svg>
